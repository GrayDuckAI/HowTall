// ── State ──────────────────────────────────────────────────────────────
let state = {
  celebs: [...CELEBS],
  favorites: new Set(),
  tab: 'all',        // all | favorites | shorter
  search: '',
  sortDir: 'desc',
  showAdd: false,
  confirmDel: null,
  newName: '', newFeet: '', newInches: '', newBio: '',
  lookSt: 'idle',   // idle | loading | success | error
  lookMsg: '',
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ── Lookup ─────────────────────────────────────────────────────────────
async function lookupCelebrity(name) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 80,
      messages: [{
        role: 'user',
        content: `How tall is ${name} and what are they known for? Reply in exactly this format:\nFEET: 5\nINCHES: 10\nJOB: Actor and comedian`,
      }],
    }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const text = (data?.content?.[0]?.text || '').trim();
  const fM = text.match(/FEET:\s*(\d+)/i);
  const iM = text.match(/INCHES:\s*([\d.]+)/i);
  const jM = text.match(/JOB:\s*(.+)/i);
  if (!fM || !iM) throw new Error('Could not parse response. Enter height manually.');
  return { feet: parseInt(fM[1], 10), inches: parseFloat(iM[1]), bio: jM ? jM[1].trim() : '' };
}

// ── Computed ───────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...state.celebs];
  if (state.tab === 'shorter')   list = list.filter(c => c.height < HEIDI);
  if (state.tab === 'favorites') list = list.filter(c => state.favorites.has(c.id));
  if (state.search.trim())       list = list.filter(c => c.name.toLowerCase().includes(state.search.toLowerCase()));
  list.sort((a, b) => state.sortDir === 'desc' ? b.height - a.height : a.height - b.height);
  return list;
}

// ── Render ─────────────────────────────────────────────────────────────

          font-weight:600;font-size:13px;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px;
          background:${!state.newName.trim()?'#1e1e3a':'linear-gradient(135deg,#06b6d4,#3b82f6)'};
          color:${!state.newName.trim()?'#3a3a6a':'#fff'}">
          ${state.lookSt==='loading'
            ?'<span style="display:inline-block;width:12px;height:12px;border:2px solid #ffffff44;border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite"></span> Looking…'
            :'🔎 Look Up'}
        </button>
      </div>
      ${state.lookSt==='success'?`<div style="background:#0f2a1a;border:1px solid #34d39944;border-radius:8px;padding:8px 12px;color:#6ee7b7;font-size:13px">✓ ${escHtml(state.lookMsg)}</div>`:''}
      ${state.lookSt==='error'?`<div style="background:#2a1a1a;border:1px solid #f8717144;border-radius:8px;padding:8px 12px;color:#f87171;font-size:13px">✗ ${escHtml(state.lookMsg)}</div>`:''}
      <div style="display:flex;gap:8px">

    ${state.tab==='all' && !state.search ? `

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildRuler() {
  const ruler = document.getElementById('ruler');
  if (!ruler) return;
  let html = '';
  for (let i = 0; i < 120; i++) {
    const w = i%4===0?18:i%2===0?12:7;
    const col = i%4===0?'#7c9eff':'#3a3a6a';
    html += `<div style="display:flex;align-items:center;width:100%;justify-content:flex-end;height:10px;padding-right:3px;position:relative">
      <div style="background:${col};height:1px;width:${w}px"></div>
      ${i%4===0?`<span style="font-size:7px;color:#7c9eff;position:absolute;left:2px;font-family:monospace;line-height:1;user-select:none">${i/4}</span>`:''}
    </div>`;
  }
  ruler.innerHTML = html;
}

function celebCard(c, idx) {
  const above = c.height > HEIDI;
  const isFav = state.favorites.has(c.id);
  const isDel = state.confirmDel === c.id;
  const pct = Math.max(5, (c.height/84)*100);
  const barColor = above ? 'linear-gradient(90deg,#7c9eff,#a78bfa)' : 'linear-gradient(90deg,#f472b6,#fb923c)';
  return `
  <div class="card" style="background:${isFav?'#16142e':'#12122a'};border-radius:12px;padding:12px 10px 12px 14px;
    border:1px solid ${isFav?'#f59e0b44':above?'#2a2a55':'#2a1a35'};
    display:flex;align-items:center;gap:10px;transition:transform .15s,box-shadow .15s"
    onmouseenter="this.style.transform='translateX(3px)';this.style.boxShadow='0 2px 20px #0006'"
    onmouseleave="this.style.transform='none';this.style.boxShadow='none'">

    <div style="width:30px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;
      background:${idx<3?'linear-gradient(135deg,#7c9eff,#a78bfa)':'#1a1a38'};
      color:${idx<3?'#fff':'#4444aa'}">#${idx+1}</div>

    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="color:#e0e0ff;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.name)}</span>
        <span style="color:${above?'#7c9eff':'#f472b6'};font-weight:700;font-size:13px;flex-shrink:0;margin-left:8px">${fmtH(c.height)}</span>
      </div>
      <div style="color:#555588;font-size:11px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.bio)}</div>
      <div style="width:100%;height:4px;background:#1e1e3a;border-radius:2px;margin-top:6px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:2px"></div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
      <button onclick="toggleFav(${c.id})"
        onmouseenter="this.style.color='${isFav?'#fbbf24':'#7c9eff'}'"
        onmouseleave="this.style.color='${isFav?'#f59e0b':'#2d2d55'}'"
        style="background:none;border:none;cursor:pointer;font-size:20px;line-height:1;padding:3px 5px;border-radius:6px;
          color:${isFav?'#f59e0b':'#2d2d55'};transition:color .2s">★</button>
      ${isDel ? `
        <div style="display:flex;gap:2px">
          <button onclick="confirmDel(${c.id})" style="background:#3a1a1a;border:1px solid #f8717144;border-radius:6px;color:#f87171;cursor:pointer;font-size:11px;font-weight:700;padding:3px 6px;font-family:'DM Sans',sans-serif">✓</button>
          <button onclick="cancelDel()" style="background:#1e1e38;border:1px solid #2d2d55;border-radius:6px;color:#888;cursor:pointer;font-size:11px;font-weight:700;padding:3px 6px;font-family:'DM Sans',sans-serif">✕</button>
        </div>` : `
        <button onclick="startDel(${c.id})"
          onmouseenter="this.style.color='#f87171'"
          onmouseleave="this.style.color='#2d2d55'"
          style="background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;border-radius:6px;color:#2d2d55;line-height:1">🗑</button>`}
    </div>
  </div>`;
}

function emptyState() {
  if (state.tab === 'favorites') return `<div style="text-align:center;color:#555588;padding:32px 16px;font-size:14px">No favorites yet — tap ★ to save someone!</div>`;
  if (state.search) return `
    <div style="text-align:center;color:#555588;padding:32px 16px;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <span style="font-size:28px">🔍</span>
      <div><strong style="color:#7c9eff">"${escHtml(state.search)}"</strong> isn't in the list yet.</div>
      <button onclick="openAdd('${escHtml(state.search).replace(/'/g,"\\'")}')" style="background:linear-gradient(135deg,#7c9eff,#a78bfa);border:none;border-radius:10px;color:#fff;padding:10px 20px;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif">
        + Add "${escHtml(state.search)}" to the Board
      </button>
    </div>`;
  return `<div style="text-align:center;color:#555588;padding:32px 16px">No results</div>`;
}

function bindAddInputs() {
  const fields = ['newName','newFeet','newInches','newBio'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', e => { state[id] = e.target.value; });
  });
  const nn = document.getElementById('newName');
  if (nn) nn.addEventListener('keydown', e => { if (e.key==='Enter') doLookup(); });
}

// ── Actions ────────────────────────────────────────────────────────────
function setTab(t)      { setState({ tab: t }); }
function toggleSort()   { setState({ sortDir: state.sortDir==='desc'?'asc':'desc' }); }
function clearSearch()  { setState({ search: '' }); }
function toggleAdd()    {
  if (state.showAdd) setState({ showAdd: false, lookSt: 'idle', lookMsg: '' });
  else setState({ showAdd: true, newName:'', newFeet:'', newInches:'', newBio:'', lookSt:'idle', lookMsg:'' });
}
function openAdd(name)  { setState({ showAdd: true, newName: name||'', newFeet:'', newInches:'', newBio:'', lookSt:'idle', lookMsg:'' }); }
function toggleFav(id)  { const f = new Set(state.favorites); f.has(id)?f.delete(id):f.add(id); setState({ favorites: f }); }
function startDel(id)   { setState({ confirmDel: id }); }
function cancelDel()    { setState({ confirmDel: null }); }
function confirmDel(id) {
  const f = new Set(state.favorites); f.delete(id);
  setState({ celebs: state.celebs.filter(c=>c.id!==id), favorites: f, confirmDel: null });
}
function doAdd() {
  const name = state.newName.trim();
  if (!name) return;
  const h = toIn(parseInt(state.newFeet)||0, parseFloat(state.newInches)||0);
  const newCeleb = { id: Date.now(), name, height: h, bio: state.newBio.trim()||'Celebrity' };
  setState({ celebs: [...state.celebs, newCeleb], search:'', tab:'all', showAdd:false, lookSt:'idle', lookMsg:'' });
}
async function doLookup() {
  const name = state.newName.trim();
  if (!name || state.lookSt==='loading') return;
  setState({ lookSt:'loading', lookMsg:'' });
  try {
    const { feet, inches, bio } = await lookupCelebrity(name);
    setState({ newFeet: String(feet), newInches: String(inches), newBio: bio||state.newBio, lookSt:'success', lookMsg:'Found! Review and edit if needed.' });
  } catch(e) {
    setState({ lookSt:'error', lookMsg: e.message });
  }
}

// ── Init ───────────────────────────────────────────────────────────────
render();
</script>
